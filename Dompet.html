<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOMPET SUAMI - Cloud</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --red: #FF5252; --green: #76FF03; }
        * { box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #0A192F 0%, #1B5E20 100%); color: white; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .container { width: 92%; max-width: 380px; background: rgba(0, 0, 0, 0.85); border: 2px solid var(--gold); border-radius: 35px; padding: 25px; margin-bottom: 30px; }
        .header h1 { font-family: 'Orbitron'; font-size: 16px; color: var(--gold); text-align: center; margin-bottom: 20px; letter-spacing: 2px; }
        .stat-box { background: rgba(255, 255, 255, 0.08); border-radius: 20px; padding: 15px; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 12px; text-align: center; cursor: pointer; }
        .label { font-size: 9px; color: var(--gold); text-transform: uppercase; }
        .val-saldo { font-size: 26px; font-weight: bold; color: var(--green); }
        .val-out { font-size: 22px; font-weight: bold; color: var(--red); }
        input { width: 100%; padding: 14px; border-radius: 15px; border: 1px solid var(--gold); background: rgba(255,255,255,0.05); color: white; margin-bottom: 10px; outline: none; }
        .btn-topup { width: 100%; padding: 16px; border-radius: 50px; border: none; font-weight: bold; background: linear-gradient(to right, #FFD700, #B8860B); color: black; cursor: pointer; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .modal-content { background: #0A192F; width: 85%; padding: 20px; border-radius: 25px; border: 2px solid var(--gold); }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>MODE SUAMI</h1></div>
    <div class="stat-box" onclick="showRincian()"><div class="label">SALDO KAS RUMAH</div><div id="display-saldo" class="val-saldo">Rp 0</div></div>
    <div class="stat-box" onclick="showRincian()" style="border-color: var(--red);"><div class="label" id="label-bulan">PENGELUARAN ISTRI</div><div id="display-out" class="val-out">Rp 0</div></div>
    <input type="text" id="amt-display" placeholder="Tambah Saldo Rp" oninput="formatRupiah(this)"><input type="hidden" id="amt-raw">
    <input type="text" id="desc" placeholder="Keterangan (Top Up)">
    <button class="btn-topup" onclick="kirimData()">ISI SALDO</button>
</div>
<div id="modalRincian" class="modal" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="color: var(--gold); text-align: center; font-size: 16px;">RINCIAN BOOMM!</h3>
        <div style="max-height: 250px; overflow-y: auto;">
            <table style="width:100%; font-size:11px; border-collapse:collapse;">
                <tbody id="list-rincian"></tbody>
            </table>
        </div>
        <button class="btn btn-topup" style="margin-top:15px; padding:10px" onclick="document.getElementById('modalRincian').style.display='none'">TUTUP</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://home-67115-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();
    let currentData = { saldo: 0, pengeluaranBulanIni: 0, riwayat: [] };
    function formatRupiah(el) { let val = el.value.replace(/\D/g, ""); document.getElementById('amt-raw').value = val; el.value = val.replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
    db.ref('keuangan_keluarga').on('value', (s) => { const d = s.val(); if(d){ currentData=d; updateUI(); } });
    function kirimData() {
        const amt = parseInt(document.getElementById('amt-raw').value); const dsc = document.getElementById('desc').value;
        if(!amt || !dsc) return Swal.fire('Gagal!', 'Isi nominal dulu Bos!', 'warning');
        let newSaldo = (currentData.saldo || 0) + amt;
        let newRiwayat = currentData.riwayat || []; newRiwayat.unshift({ dsc, amt, type: 'plus', date: new Date().toLocaleDateString('id-ID') });
        db.ref('keuangan_keluarga').update({ saldo: newSaldo, riwayat: newRiwayat }).then(() => {
            document.getElementById('amt-display').value = ""; document.getElementById('desc').value = ""; Swal.fire('BOOMM!', 'Saldo Terisi.', 'success');
        });
function updateUI() {
        // 1. Tampilkan Saldo Utama
        document.getElementById('display-saldo').innerText = "Rp " + (currentData.saldo || 0).toLocaleString('id-ID');

        // 2. Hitung total pengeluaran dari data riwayat secara otomatis
        let totalKeluar = 0;
        if (currentData.riwayat) {
            currentData.riwayat.forEach(item => {
                // Kita cuma mau hitung yang tipenya 'minus' (Pengeluaran Istri)
                if (item.type === 'minus') {
                    totalKeluar += item.amt;
                }
            });
        }

        // 3. Tampilkan hasil hitungan ke dashboard 'PENGELUARAN ISTRI'
        document.getElementById('display-out').innerText = "Rp " + totalKeluar.toLocaleString('id-ID');
    }
    
    function showRincian() {
    const list = document.getElementById('list-rincian');
    list.innerHTML = "";
    if(!currentData.riwayat) return;

    currentData.riwayat.forEach((i, index) => {
        list.innerHTML += `
        <tr style="border-bottom: 1px solid #333;">
            <td style="font-size:8px;color:#aaa">${i.date}</td>
            <td style="color:white;padding:10px 5px">${i.dsc}</td>
            <td style="color:${i.type==='plus'?'#76FF03':'#FF5252'};font-weight:bold">
                ${i.type==='plus'?'+':'-'}${i.amt.toLocaleString('id-ID')}
            </td>
            <td style="padding-left:10px">
                <button onclick="hapusItem(${index})" style="background:none; border:none; color:#FF5252; cursor:pointer; font-size:14px;">🗑️</button>
            </td>
        </tr>`;
    });
    document.getElementById('modalRincian').style.display='flex';
}
    function hapusItem(index) {
    Swal.fire({
        title: 'Hapus Data?',
        text: "Saldo dan pengeluaran akan otomatis disesuaikan!",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#FF5252',
        cancelButtonColor: '#aaa',
        confirmButtonText: 'Ya, Hapus!'
    }).then((result) => {
        if (result.isConfirmed) {
            let riwayatLama = [...currentData.riwayat];
            let itemHapus = riwayatLama[index];
            
            // 1. Logika penyesuaian Saldo Utama
            let penyesuaianSaldo = itemHapus.type === 'plus' ? -itemHapus.amt : itemHapus.amt;
            let saldoBaru = (currentData.saldo || 0) + penyesuaianSaldo;
            
            // 2. Logika penyesuaian Pengeluaran Istri (KHUSUS TYPE MINUS)
            let pengeluaranBaru = currentData.pengeluaranBulanIni || 0;
            if (itemHapus.type === 'minus') {
                pengeluaranBaru -= itemHapus.amt;
            }
            
            // Pastikan tidak minus angkanya (biar gak aneh tampilannya)
            if (pengeluaranBaru < 0) pengeluaranBaru = 0;

            // 3. Buang item dari array
            riwayatLama.splice(index, 1);
            
            // 4. Update ke Firebase secara keseluruhan
            db.ref('keuangan_keluarga').update({
                saldo: saldoBaru,
                pengeluaranBulanIni: pengeluaranBaru, // Ini yang tadi ketinggalan!
                riwayat: riwayatLama
            }).then(() => {
                Swal.fire('Terhapus!', 'Data sudah sinkron kembali.', 'success');
                document.getElementById('modalRincian').style.display='none';
            });
        }
    });
}
</script>
</body>
</html>
